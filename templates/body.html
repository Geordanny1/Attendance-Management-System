<!DOCTYPE html>

<html lang="En">

<html lang="en-us">

<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}" media="all">
</head>

<body>


  <div class="main">


    <div>
      <nav class="navbar-wrapper">
        <ul class="navbar">
          <li > <a  class="{% if request.path == "/" %}active{% endif %}" href="/">home</a></li>
          <li> <a class="{% if request.path == "/management" %}active{% endif %}"  href="/management">management</a> </li>
          <li> <a  class="{% if request.path == "/statistics" %}active{% endif %}" href="/statistics">statistics</a></li>
          <li> <a  class="{% if request.path == "/about" %}active{% endif %}" href="/about">about</a></li>
        </ul>
      </nav>

      <div class="main">
        <header>
          <h1 class="title">{{title}} page</h1>
            <input id="data-input" type="file" name="input for entering the excel file">
        </header>
        {% block content %}{% endblock %}
      </div>

    </div>
  </div>



    <footer>
      <p>made with love by &hearts; Geordanny</p>
    </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
